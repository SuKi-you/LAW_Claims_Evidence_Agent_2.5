            confirmed_claims 是唯一诉求入口，不得根据原始案情或知识库召回内容扩展未确认诉求。

            如果知识库召回内容与 confirmed_claims 明显无关，应忽略无关召回，只输出 confirmed_claims 对应的保守证据清单。

            硬兜底：只要 confirmed_claims 非空，core_evidence 绝对不得为空数组。如果知识库召回为空或无关，必须从固定证据模板中输出 confirmed_claims 对应诉求的保守基础证据。'
